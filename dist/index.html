<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emotion Analyzer | Facial Expression</title>
    <!-- Use Google Fonts (Inter and Space Grotesk) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <!-- Load face-api.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script type="module" crossorigin src="/assets/index-D5tkjCgp.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-CfcJldwm.css">
  </head>
  <body>
    <div class="app-container">
      <header class="app-header">
        <div class="logo">
          <span class="logo-icon">👁️</span>
          <h1>Emotion Analyzer</h1>
        </div>
        <p class="subtitle">Real-time facial expression analysis powered by AI.</p>
      </header>

      <main class="main-content">
        <div class="video-container">
          <div class="loader-overlay" id="loader">
            <div class="spinner"></div>
            <p>Loading AI Models...</p>
          </div>
          <video id="videoElement" autoplay muted playsinline></video>
          <!-- Canvas for drawing detections -->
        </div>

        <div class="insights-panel">
          <h2>Current Emotion</h2>
          <div class="emotion-display" id="emotionDisplay">
            <div class="emotion-icon" id="emotionIcon">🤔</div>
            <div class="emotion-name" id="emotionName">Detecting...</div>
          </div>
          
          <div class="emotion-bars" id="emotionBars">
            <!-- Bars will be generated via JS -->
          </div>
        </div>
      </main>
      
      <footer class="app-footer">
        <button id="startBtn" class="primary-btn" disabled>
          <span class="btn-icon">⚡</span> Initialize Camera
        </button>
      </footer>
    </div>
  </body>
</html>
